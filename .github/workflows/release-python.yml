name: release-python

# Builds cross-platform wheels for the `mempill` PyO3 package (mempill-python/)
# and publishes them to PyPI.
#
# The package uses abi3 (abi3-py311), so ONE wheel per OS/arch covers Python 3.11+
# — no per-Python-version matrix needed.
#
# HOW TO RUN
#   - Backfill the current release (e.g. add Linux/Windows/macOS-Intel wheels to an
#     already-published 0.2.0): Actions tab -> "release-python" -> Run workflow.
#     `--skip-existing` means files already on PyPI (e.g. the macOS arm64 wheel and
#     the sdist) are skipped instead of failing.
#   - Future releases: bump the version in mempill-python/{Cargo.toml,pyproject.toml},
#     then push a tag `python-vX.Y.Z`.
#
# AUTH — Trusted Publishing (recommended, no token in the repo):
#   On PyPI: project `mempill` -> Manage -> Publishing -> Add a trusted publisher:
#     Owner: mempill-ai   Repository: mempill   Workflow: release-python.yml
#     (Environment: leave blank, or set `pypi` and add `environment: pypi` to the
#      publish job below.)
#   The `id-token: write` permission on the publish job does the OIDC exchange.
#
# AUTH — Token alternative (if you prefer):
#   Replace the `pypa/gh-action-pypi-publish` step with:
#     - uses: PyO3/maturin-action@v1
#       with: { command: upload, args: "--non-interactive --skip-existing dist/*" }
#       env: { MATURIN_PYPI_TOKEN: "${{ secrets.PYPI_API_TOKEN }}" }
#   and add PYPI_API_TOKEN as a repository secret.

on:
  push:
    tags: ["python-v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheels (manylinux)
        uses: PyO3/maturin-action@v1
        with:
          working-directory: mempill-python
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: mempill-python/dist/*.whl

  macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheels (macOS ${{ matrix.target }})
        uses: PyO3/maturin-action@v1
        with:
          working-directory: mempill-python
          target: ${{ matrix.target }}
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: mempill-python/dist/*.whl

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheels (Windows x64)
        uses: PyO3/maturin-action@v1
        with:
          working-directory: mempill-python
          target: x64
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: mempill-python/dist/*.whl

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: mempill-python
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: mempill-python/dist/*.tar.gz

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [linux, macos, windows, sdist]
    permissions:
      id-token: write   # OIDC for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to PyPI (skip files already uploaded)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
